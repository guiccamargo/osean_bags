<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% block styles %}
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="{{ url_for('static', filename='img/favicon.ico') }}" rel="shortcut icon">
    <!-- CSS Crítico inline (above-the-fold): header, logo, nav, body base -->
    <style>
        body {
            padding-top: 110px;
            padding-bottom: 42px;
        }
        hr { margin-top: 0; margin-bottom: 0; }
        #logo {
            background-image: url('../img/logo.webp');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 115px;
            height: 64px;
        }
        #logo a {
            display: block;
            width: 100%;
            height: 100%;
        }
        .btn {
            position: relative;
        }
        .btn-custom {
            --bs-btn-bg: transparent;
            --bs-btn-border-color: transparent;
            --bs-btn-hover-bg: transparent;
            --bs-btn-hover-border-color: #6B5F3B;
            --bs-btn-active-bg: transparent;
            --bs-btn-active-border-color: #6B5F3B;
            --bs-btn-color: #6B5F3B;
            --bs-btn-hover-color: #6B5F3B;
        }
        .btn-circle {
            aspect-ratio: 1 / 1;
            width: 40px;
            border-radius: 50%;
            display: grid;
            place-items: center;
        }
        .btn-overlay {
            position: absolute;
            padding-bottom: 50%;
            top: 60%;
            left: 60%;
            width: 50%;
            height: 50%;
            background-color: #C8BC9A;
            color: white;
        }
        .texto-estilizado { color: #6B5F3B; }
        .nav { align-items: center; }
        .rounded-circle { border-radius: 50% !important; }
        header.px-3 {
            background-color: #f8f9fa;
        }
        /* Evita layout shift do footer fixo */
        footer.fixed-bottom {
            background-color: #f8f9fa;
        }
    </style>
    <link as="style"
          href="{{url_for('static', filename='css/styles.css')}}"
          onload="this.onload=null;this.rel='stylesheet'"
          rel="preload">
    <noscript>
        <link href="{{url_for('static', filename='css/styles.css')}}" rel="stylesheet">
    </noscript>
    <link href="{{url_for('static', filename='css/bootstrap.custom.css')}}" rel="stylesheet">
    <!-- Meta Pixel Code -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '{{ META_PIXEL_ID }}');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" src="https://www.facebook.com/tr?id=SEU_PIXEL_ID&ev=PageView&noscript=1" style="display:none"
             width="1"/>
    </noscript>
    <!-- End Meta Pixel Code -->
    <link
            href="{{url_for('static', filename='css/styles.css') }}"
            rel="stylesheet"
            type="text/css"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&display=swap" rel="stylesheet">

    {% endblock %}
</head>
<body class="bg-light">
<svg style="display: none;" xmlns="http://www.w3.org/2000/svg">
    <symbol fill="currentColor" id="check-circle-fill" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
    </symbol>
    <symbol fill="currentColor" id="info-fill" viewBox="0 0 16 16">
        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
    </symbol>
    <symbol fill="currentColor" id="exclamation-triangle-fill" viewBox="0 0 16 16">
        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
    </symbol>
</svg>
<header class="px-3 pb-2 bg-light text-white row fixed-top">
    <div class="d-flex flex-wrap py-2 justify-content-between">
        <ul class="nav nav-pills my-3">
            <li class="nav-item"><a aria-label="Visualizar produtos." class="btn btn-custom"
                                    href="{{url_for('produtos.produtos')}}">
                <strong>Produtos</strong>
            </a></li>
            <li class="nav-item"><a aria-label="Saber mais sobre a empresa." class="btn btn-custom"
                                    href="{{url_for('geral.sobre_nos')}}">
                <strong>Sobre Nós</strong>
            </a></li>
        </ul>
        <div class="mx-1" id="logo">
            <a aria-label="Voltar para a página inicial" class="btn btn-custom" href="{{url_for('geral.home')}}"></a>
        </div>
        <ul class="nav nav-pills">
            {% if admin: %}
            <li class="nav-item"><a aria-label="Acessar interface de administrador." class="btn btn-custom mx-1"
                                    href="/admin">
                <svg class="bi bi-gear" fill="#6B5F3B" height="25" viewBox="0 0 16 16" width="25"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                    <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
                </svg>
            </a></li>
            {% endif %}
            {% if logged_in %}
            <li class="nav-item"><a aria-label="Ver itens no carrinho." class="btn btn-custom mx-1"
                                    href="{{url_for('carrinho.ir_para_carrinho') }}">
                <svg class="bi bi-bag" fill="#6B5F3B" height="25" viewBox="0 0 16 16" width="25"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
                </svg>
                {% if total_items %}
                <span class="btn-overlay rounded-circle">
                    {{total_items}}
                </span>
                {% endif %}
            </a></li>
            <li class="nav-item">
                <div class="dropdown mx-2">
                    <button aria-expanded="false" class="btn rounded-circle btn-circle" data-bs-toggle="dropdown"
                            id="dropdown-perfil" type="button">
                        <strong>{{ inicial_nome }}</strong>
                    </button>
                    <ul aria-labelledby="dropdownMenuButton1" class="dropdown-menu dropdown-menu-end">
                        <li><a aria-label="Visualizar pedidos realizados." class="dropdown-item texto-estilizado"
                               href="{{ url_for('conta.meus_pedidos', usuario_id=id_usuario) }}">Meus Pedidos</a></li>
                        <li><a aria-label="Gerenciar sua conta" class="dropdown-item texto-estilizado"
                               href="{{ url_for('conta.gerenciar', usuario_id=id_usuario) }}">Gerenciar Conta</a></li>
                        <li><a aria-label="Fazer logout" class="dropdown-item texto-estilizado"
                               href="{{url_for('auth.logout')}}">Sair</a></li>
                    </ul>
                </div>
            </li>
            {% else: %}
            <li class="nav-item"><a aria-label="Fazer login." class="btn btn-custom mx-1"
                                    href="{{url_for('auth.login')}}">
                <svg class="bi bi-person" fill="#6B5F3B" height="25" viewBox="0 0 16 16" width="25"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                </svg>
            </a></li>
            {% endif %}
        </ul>
    </div>
</header>

</body>
</html>
