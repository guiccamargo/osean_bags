<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% block styles %}
    {{ bootstrap.load_css() }}
    <link
            href="{{url_for('static', filename='css/styles.css') }}"
            type="text/css"
            rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    {% endblock %}
</head>
<body>
<header class="px-3 pb-2 bg-light text-white row">
    <div class="d-flex flex-wrap py-2 justify-content-between">
        <ul class="nav nav-pills my-3">
            <li class="nav-item"><a href="{{ url_for('site.produtos') }}" class="btn btn-custom">
                <strong>Produtos</strong>
            </a></li>
            <li class="nav-item"><a href="{{ url_for('site.sobre_nos') }}" class="btn btn-custom">
                <strong>Sobre Nós</strong>
            </a></li>
        </ul>
        <div id="logo" class="mx-1">
            <a href="{{ url_for('site.home') }}" class="btn btn-custom"></a>
        </div>
        <ul class="nav nav-pills">
            {% if admin: %}
            <li class="nav-item"><a href="/admin" class="btn btn-custom mx-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="#6B5F3B" class="bi bi-gear"
                     viewBox="0 0 16 16">
                    <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                    <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
                </svg>
            </a></li>
            {% endif %}
            {% if logged_in: %}
            <li class="nav-item"><a href="{{url_for('site.ir_para_carrinho') }}" class="btn btn-custom mx-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="#6B5F3B" class="bi bi-bag"
                     viewBox="0 0 16 16">
                    <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
                </svg>
                {% if total_items: %}
                <span class="btn-overlay rounded-circle">
                    {{total_items}}
                </span>
                {% endif %}
            </a></li>
            <li class="nav-item">
                <div class="dropdown mx-2">
                    <button class="btn rounded-circle btn-circle" type="button" id="dropdown-perfil"
                            data-bs-toggle="dropdown" aria-expanded="false">
                        <strong>{{ inicial_nome }}</strong>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuButton1">
                        <li><a class="dropdown-item texto-estilizado" href="#">Meus Pedidos</a></li>
                        <li><a class="dropdown-item texto-estilizado" href="{{ url_for('site.gerenciar', usuario_id=id_usuario) }}">Gerenciar Conta</a></li>
                        <li><a class="dropdown-item texto-estilizado" href="{{ url_for('site.logout') }}">Sair</a></li>
                    </ul>
                </div>
            </li>
            {% else: %}
            <li class="nav-item"><a href="{{ url_for('site.login') }}" class="btn btn-custom mx-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="#6B5F3B" class="bi bi-person"
                     viewBox="0 0 16 16">
                    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                </svg>
            </a></li>
            {% endif %}
        </ul>
    </div>
</header>
</body>
</html>
