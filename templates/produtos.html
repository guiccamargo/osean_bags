<!DOCTYPE html>
<html lang="en">
{%include "header.html" %}
<head>
    <title>Produto</title>
</head>
<body data-new-gr-c-s-check-loaded="8.932.0" data-gr-ext-installed="">
<header
        class="masthead"
        style="background-image: url('../static/assets/img/home-bg.jpg')">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="page-heading">
                    <h1>Lista de produtos</h1>
<!--                    <span class="subheading">Welcome!</span>-->
                </div>
            </div>
        </div>
    </div>
</header>
<main>
    <div class="album py-5 bg-light">
        <div class="container">
            <div class="row row-cols-2 row-cols-md-5 g-2">
                {% for produto in lista_produtos: %}
                <div class="col">
                    <div class="card shadow-sm">
                        <img class="card-img-top produto-img" src="static/uploads/{{produto.imagem}}"/>
                        <div class="card-body">
                            <p class="card-text">{{produto.nome}}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted">R${{produto.preco}}</small>
                                <div class="btn-group">
                                     {% if logged_in: %}
                                    <a href="{{url_for('site.buy_product', produto_id=produto.id)}}" type="button"
                                    class="btn btn-sm btn-warning">Adicionar Ao Carrinho</a>
                                    {% else: %}
                                    <a href="{{url_for('site.login')}}" type="button"
                                    class="btn btn-sm btn-warning">Adicionar Ao Carrinho</a>
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</main>
</body>
<footer>
    {% include "footer.html" %}
</footer>
</html>
