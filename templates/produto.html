<!DOCTYPE html>
<html lang="pt-br">
{%include "header.html" %}
<head>
    <title>{{ produto.nome }}</title>
</head>
<body>
<div class="container">
    <div class="row">
        <div id="carouselExampleControls" class="carousel carousel-dark slide col" data-bs-ride="carousel">
            <div class="carousel-inner">

                {% for foto in fotos %}
                <div class="carousel-item {% if loop.first %}active{% endif %}">
                    <img src="{{ url_for('static', filename='uploads/' ~ foto.arquivo) }}"
                         class="d-block w-100"
                         style="max-height:400px; object-fit:cover;">
                </div>
                {% endfor %}
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls"
                    data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls"
                    data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        <div class="col-1"></div>
        <div class="col">
            <h1>
                {{ produto.nome }}
            </h1>
            <h2>
                <small class="text-muted">R${{produto.preco}}</small>
            </h2>
            {% if logged_in: %}
            <a href="{{url_for('site.buy_product', produto_id=produto.id)}}" type="button"
               class="btn btn-sm btn-custom-comprar">Adicionar Ao Carrinho</a>
            {% else: %}
            <a href="{{url_for('site.login')}}" type="button"
               class="btn btn-sm btn-custom-comprar">Adicionar Ao Carrinho</a>
            {% endif %}
        </div>
    </div>
</div>
<div class="container">
    <p>
        {{ produto.descricao }}
    </p>
</div>
</body>
<footer>
    {% include "footer.html" %}
</footer>
</html>
